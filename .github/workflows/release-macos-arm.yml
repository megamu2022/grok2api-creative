name: Release macOS arm64

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-macos-arm64:
    runs-on: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Build release
        run: cargo build --release --target aarch64-apple-darwin

      - name: Package
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME:-dev}"
          OUT="dist"
          APP_NAME="Grok2API Creative"
          BIN_SRC="target/aarch64-apple-darwin/release/grok2api-creative"
          STAGE="${OUT}/stage"
          APP_DIR="${STAGE}/${APP_NAME}.app"
          MACOS_DIR="${APP_DIR}/Contents/MacOS"
          RES_DIR="${APP_DIR}/Contents/Resources"
          mkdir -p "${MACOS_DIR}" "${RES_DIR}" "${OUT}"
          cp "${BIN_SRC}" "${MACOS_DIR}/grok2api-creative"
          chmod +x "${MACOS_DIR}/grok2api-creative"
          # Bundle UI assets next to binary (app looks relative to exe parent via CARGO_MANIFEST fallback;
          # also copy assets for runtime via GROK2API_CREATIVE_UI or same-dir assets).
          cp -R assets "${MACOS_DIR}/assets"
          cat > "${APP_DIR}/Contents/Info.plist" <<EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>CFBundleName</key>
            <string>${APP_NAME}</string>
            <key>CFBundleDisplayName</key>
            <string>${APP_NAME}</string>
            <key>CFBundleIdentifier</key>
            <string>com.grok2api.creative</string>
            <key>CFBundleVersion</key>
            <string>${VERSION}</string>
            <key>CFBundleShortVersionString</key>
            <string>${VERSION}</string>
            <key>CFBundleExecutable</key>
            <string>grok2api-creative</string>
            <key>CFBundlePackageType</key>
            <string>APPL</string>
            <key>LSMinimumSystemVersion</key>
            <string>12.0</string>
            <key>NSHighResolutionCapable</key>
            <true/>
          </dict>
          </plist>
          EOF
          # Launcher wrapper so UI assets resolve
          mv "${MACOS_DIR}/grok2api-creative" "${MACOS_DIR}/grok2api-creative.bin"
          cat > "${MACOS_DIR}/grok2api-creative" <<'WRAP'
          #!/bin/bash
          DIR="$(cd "$(dirname "$0")" && pwd)"
          export GROK2API_CREATIVE_UI="${DIR}/assets"
          exec "${DIR}/grok2api-creative.bin"
          WRAP
          chmod +x "${MACOS_DIR}/grok2api-creative"
          # Also ship plain binary tarball
          mkdir -p "${OUT}/bin"
          cp "${BIN_SRC}" "${OUT}/bin/grok2api-creative"
          cp -R assets "${OUT}/bin/assets"
          cat > "${OUT}/bin/run.sh" <<'RUN'
          #!/bin/bash
          DIR="$(cd "$(dirname "$0")" && pwd)"
          export GROK2API_CREATIVE_UI="${DIR}/assets"
          exec "${DIR}/grok2api-creative"
          RUN
          chmod +x "${OUT}/bin/run.sh" "${OUT}/bin/grok2api-creative"
          (
            cd "${STAGE}"
            ditto -c -k --sequesterRsrc --keepParent "${APP_NAME}.app" "../Grok2API-Creative-macos-arm64.app.zip"
          )
          (
            cd "${OUT}/bin"
            tar -czf "../Grok2API-Creative-macos-arm64.tar.gz" grok2api-creative run.sh assets
          )
          ls -lh "${OUT}"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: grok2api-creative-macos-arm64
          path: |
            dist/Grok2API-Creative-macos-arm64.app.zip
            dist/Grok2API-Creative-macos-arm64.tar.gz

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/Grok2API-Creative-macos-arm64.app.zip
            dist/Grok2API-Creative-macos-arm64.tar.gz
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
